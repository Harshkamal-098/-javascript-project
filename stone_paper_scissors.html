<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stone_paper_scissors</title>
    <link rel="stylesheet"  href="stone_paper_scissors.css" >
</head>
<body>
    <h1>Stone paper Scissors</h1>
    <div class="container">
    <div class="game" id="Stone">
      <img src="rock.png" />
    </div>
    <div class="game" id="paper">
        <img src="paper.png" />
    </div>
    <div class="game" id="Scissors">
        <img src="scissors.png" />
    </div>
    </div>
    <div class="Score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Computer</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">Play Your Moves</p>
    </div>
    <script src="stone_paper_scissors.js"></script>
</body>
